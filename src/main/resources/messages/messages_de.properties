about-caption-34=Der Beginn unserer Geschichte
about-caption-35=Jede Elternreise beginnt mit einer Frage:
about-caption-36=„Bin ich bereit? Mache ich das richtig?”
about-caption-37=Lade die App herunter
about-caption-38=Elternschaft kommt nicht mit einem Handbuch
about-caption-39=Einige sind Träumer, voller Hoffnung, während sie sich vorstellen, ein Kind zum ersten Mal zu halten. Einige sind erwartungsvolle Herzen, die lernen, die Freude und Nerven der Schwangerschaft zu navigieren. Einige sind neue Nester, die um 3 Uhr morgens mit einem weinenden Baby in den Armen wach sind. Andere sind Fundamentbauer, die Grenzen mit Kleinkindern setzen, die die Welt testen, oder Entdeckerführer, die kleinen Kindern helfen, ihre ersten Schritte in die Schule und Unabhängigkeit zu machen.
about-caption-40=Elternschaft sieht für jeden anders aus, aber ein Gefühl ist universell – das Bedürfnis nach Unterstützung, Bestätigung und Anleitung, die tatsächlich zu Ihrem Leben passt.
about-caption-41new=Aus diesem Grund haben wir Genius Parenting AI entwickelt.
about-caption-42=Funktionen anzeigen
about-caption-43=Warum wir diese App entwickelt haben
about-caption-44=Wir haben eine Lücke gesehen. Zu oft erhalten Eltern allgemeine Ratschläge, die nicht ihre Kultur, Persönlichkeit oder Lebensphase widerspiegeln. Elternschaft ist nicht für alle gleich.
about-caption-441=Also haben wir gefragt: Was wäre, wenn Eltern ein Werkzeug hätten, das sie genau dort abholt, wo sie sind?
about-caption-45=Ein Quiz, das nur 30 Sekunden dauert, um Sie zu verstehen.
about-caption-46=Eine Gemeinschaft, in der Eltern sich verbinden, teilen und gemeinsam wachsen.
about-caption-47=Ein KI-Chat-Assistent, der niemals schläft, bereit, wenn sonst niemand kann.
about-caption-48=Tipps und Kurse, die auf Ihre Persönlichkeit abgestimmt sind, nicht nur auf das Alter Ihres Kindes.
about-caption-49=Wir haben Genius Parenting AI entwickelt, um dieser Partner zu sein. Nicht ein weiteres „Wie-man-es-macht“-Handbuch, sondern ein Leitfaden, der zuerst zuhört, dann auf eine Weise antwortet, die persönlich, praktisch und einfühlsam ist.
about-caption-50=Unsere Vision
about-caption-51=Eltern mit dem Wissen, den Werkzeugen und der Unterstützung zu stärken, die sie benötigen, um liebevolle, unterstützende Familien zu schaffen, die Wachstum fördern, Resilienz stärken und die nächste Generation inspirieren, mit Vertrauen, Mitgefühl und Neugier zu gedeihen.
about-caption-52=Unsere Mission
about-caption-53=Unsere Mission ist es, Eltern umsetzbare Einblicke, Expertenrat und innovative Ressourcen zu bieten, die ihnen helfen, nährende Umgebungen zu schaffen, in denen Kinder wachsen, gedeihen und die Fähigkeiten entwickeln können, die sie für den Erfolg im Leben benötigen.
about-caption-54=Unser Logo & Markenidentität
about-caption-55=Unser Logo ist mehr als ein Design – es ist ein Symbol für das, woran wir glauben.
about-caption-56=Die Farben stehen für Vielfalt, Inklusivität und die Wärme der Familienliebe.
about-caption-57-1=Die kreisförmige Form spiegelt bedingungslose Liebe und die nie endende Reise der Elternschaft wider – Wachstum, Verbindung und Neuanfänge.
about-caption-58=Der moderne, klare Stil zeigt unser Engagement, die Dinge einfach und zugänglich zu halten.
about-caption-60=Für jeden Elternteil, in jeder Phase
about-caption-61=Der Träumer
about-caption-62=Emotionale und körperliche Vorbereitung auf die Elternschaft.
about-caption-63=Das erwartende Herz
about-caption-64=Suche nach Bestätigung und Anleitung während der Schwangerschaft.
about-caption-65=Das neue Nest
about-caption-66=Anpassung an Babyzeichen, schlaflose Nächte und Bindung.
about-caption-67=Der Fundamentbauer
about-caption-68=Umgang mit Wutausbrüchen und Kleinkind-Unabhängigkeit.
about-caption-69=Der Entdeckerführer
about-caption-70=Unterstützung in den frühen Schuljahren, Neugier und soziale Fähigkeiten.
about-caption-71=Kontaktiere uns
about-caption-72=Hast du Fragen oder benötigst Unterstützung? Wir sind hier für dich, Schritt für Schritt.
