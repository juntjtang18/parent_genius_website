faq.title=FAQ - GeniusParentingAI
faq.title=Frequently Asked Questions
faq.section.about=About GeniusParentingAI
faq.q.about.created=Who created GeniusParentingAI?
faq.a.about.created.p1=GeniusParentingAI was founded by an educator and a software professional who combine expertise in child development, parenting education, technology, and lived parenting experience.
faq.a.about.created.p2=It was built from a simple belief:
faq.a.about.created.belief=Parenting deserves thoughtful, judgment-free support — especially in multicultural environments like Canada.
faq.a.about.created.p3=This platform was created not from theory alone, but from real parenting challenges and real classroom experience.
faq.q.about.mission=What is the mission of GeniusParentingAI?
faq.a.about.mission.p1=Our mission is to support parents with:
faq.a.about.mission.li1=Calm, reflective guidance
faq.a.about.mission.li2=Culturally aware parenting insights
faq.a.about.mission.li3=Ethical, privacy-first technology
faq.a.about.mission.li4=A supportive, inclusive community
faq.a.about.mission.p2=We believe confident parenting grows from understanding — not pressure.
faq.section.for=Who Is It For?
faq.q.for.who=Who is GeniusParentingAI for?
faq.a.for.who.p1=GeniusParentingAI is designed for:
faq.a.for.who.li1=Parents and caregivers
faq.a.for.who.li2=Expecting parents
faq.a.for.who.li3=Immigrant and multicultural families
faq.a.for.who.li4=Educators and practitioners
faq.a.for.who.li5=Institutions focused on family well-being
faq.a.for.who.p2=You do not need to be a “perfect parent” to belong here.
faq.a.for.who.p3=If you care about raising thoughtful, resilient children — you’re in the right place.
faq.q.for.onlyParents=Is this only for people who already have children?
faq.a.for.onlyParents.p1=Not at all.
faq.a.for.onlyParents.p2=If you are expecting or planning to have children, the platform helps you:
faq.a.for.onlyParents.li1=Prepare for parenting in Canada
faq.a.for.onlyParents.li2=Understand early childhood development
faq.a.for.onlyParents.li3=Reflect on your parenting values
faq.a.for.onlyParents.li4=Build confidence before your baby arrives
faq.q.for.diff=💡 What makes GeniusParentingAI different?
faq.a.for.diff.p1=Many parenting apps offer general advice.
faq.a.for.diff.p2=GeniusParentingAI is different because it:
faq.a.for.diff.li1=Understands multicultural parenting realities
faq.a.for.diff.li2=Blends research-based child development with lived experience
faq.a.for.diff.li3=Supports bilingual and bicultural families
faq.a.for.diff.li4=Prioritizes reflection instead of rigid instruction
faq.a.for.diff.li5=Is built privacy-first and ad-free
faq.a.for.diff.p3=We recognize the tension between cultural roots and life in Canada — and we help parents navigate it thoughtfully.
faq.section.app=What Can I Do on the App?
faq.q.app.do=What can I do on GeniusParentingAI?
faq.a.app.do.p1=Inside GeniusParentingAI, you can access:
faq.a.app.do.li1=Age-specific parenting guidance
faq.a.app.do.li2=Child growth and development tracking
faq.a.app.do.li3=Bilingual and bicultural parenting insights
faq.a.app.do.li4=Mental well-being reflections for parents
faq.a.app.do.li5=Activities and routines by age group
faq.a.app.do.li6=Community circles by city, background, or topic
faq.a.app.do.li7=AI-supported reflection tools for real-life parenting situations
faq.a.app.do.p2=It’s not just advice — it’s a space to think, grow, and connect.
faq.section.community=Can I Connect With Other Parents?
faq.q.community.connect=Can I connect with other parents?
faq.a.community.connect.p1=Yes — community is central to GeniusParentingAI.
faq.a.community.connect.p2=You can join circles based on:
faq.a.community.connect.li1=Your child’s age
faq.a.community.connect.li2=Your cultural background
faq.a.community.connect.li3=Your city
faq.a.community.connect.li4=Shared parenting interests
faq.a.community.connect.p3=Parenting should not feel isolating.
faq.section.lang=Language Support
faq.q.lang.support=Do you support multiple languages?
faq.a.lang.support.p1=We are building multilingual support progressively.
faq.a.lang.support.p2=You can choose your preferred language.
faq.a.lang.support.p3=We aim to make parenting support inclusive and accessible.
faq.section.privacy=Privacy & Ethics
faq.q.privacy.collect=Do you collect personal information?
faq.a.privacy.collect.p1=No — this is one of our core principles.
faq.a.privacy.collect.li1=No real-name requirement
faq.a.privacy.collect.li2=No mandatory verified email
faq.a.privacy.collect.li3=No child-identifiable data required
faq.a.privacy.collect.li4=Minimal data collection by design
faq.a.privacy.collect.p2=GeniusParentingAI is built to support families — not to harvest data.
faq.q.privacy.anon=Is my information anonymous?
faq.a.privacy.anon.p1=Yes.
faq.a.privacy.anon.p2=The platform is anonymous by default. You can explore freely without revealing your identity.
faq.q.privacy.share=Do you sell or share user data?
faq.a.privacy.share.p1=Never.
faq.a.privacy.share.p2=We do not sell user data.
faq.a.privacy.share.p3=We do not share personal data with advertisers.
faq.a.privacy.share.p4=We are committed to remaining ad-free.
faq.section.ai=How Is AI Used?
faq.q.ai.used=How is AI used?
faq.a.ai.used.p1=AI in GeniusParentingAI is designed to:
faq.a.ai.used.li1=Help parents reflect on situations
faq.a.ai.used.li2=Offer different perspectives
faq.a.ai.used.li3=Support thoughtful decision-making
faq.a.ai.used.p2=It does NOT:
faq.a.ai.used.no1=Diagnose children
faq.a.ai.used.no2=Replace professional advice
faq.a.ai.used.no3=Make decisions for families
faq.a.ai.used.p3=AI is a thinking partner — not a replacement for human care.
faq.q.ai.therapy=Is this a replacement for therapy or medical advice?
faq.a.ai.therapy.p1=No.
faq.a.ai.therapy.p2=GeniusParentingAI is an educational support platform, not a substitute for:
faq.a.ai.therapy.li1=Medical care
faq.a.ai.therapy.li2=Mental health treatment
faq.a.ai.therapy.li3=Professional therapy
faq.a.ai.therapy.li4=Formal assessment or diagnosis
faq.a.ai.therapy.p3=We always encourage families to seek qualified professionals when needed.
faq.section.pricing=Pricing & Membership
faq.q.pricing.free=Is GeniusParentingAI free?
faq.a.pricing.free.p1=Yes.
faq.a.pricing.free.p2=The app is free to download and free to explore.
faq.a.pricing.free.p3=Core features — guidance, tools, and community — are accessible without payment.
faq.q.pricing.needMember=Do I need a membership?
faq.a.pricing.needMember.p1=No.
faq.a.pricing.needMember.p2=Membership is optional and never required.
faq.q.pricing.whyPaid=Why offer a paid membership?
faq.a.pricing.whyPaid.p1=To sustain:
faq.a.pricing.whyPaid.li1=Ethical, privacy-first technology
faq.a.pricing.whyPaid.li2=High-quality educational content
faq.a.pricing.whyPaid.li3=Platform improvements
faq.a.pricing.whyPaid.li4=An ad-free experience
faq.a.pricing.whyPaid.p2=Parents choose freely whether to support us.
faq.q.pricing.cost=How much does membership cost?
faq.a.pricing.cost.p1=Membership pricing is displayed clearly inside the app and handled securely through Apple’s in-app purchase system.
faq.a.pricing.cost.p2=We do not process or store your payment information.
faq.section.institution=Institutional & Research Collaboration
faq.q.inst.collab=Can educators or institutions collaborate with GeniusParentingAI?
faq.a.inst.collab.p1=Yes — and we actively welcome collaboration.
faq.a.inst.collab.p2=We are open to partnerships with:
faq.a.inst.collab.li1=Schools
faq.a.inst.collab.li2=Early childhood centers
faq.a.inst.collab.li3=Community organizations
faq.a.inst.collab.li4=Universities
faq.a.inst.collab.li5=Researchers in child development and family well-being
faq.a.inst.collab.p3=Possible collaborations include:
faq.a.inst.collab.opt1=Parent education programs
faq.a.inst.collab.opt2=Research partnerships (ethical, anonymized data only)
faq.a.inst.collab.opt3=Pilot programs within communities
faq.a.inst.collab.opt4=Institutional membership models
faq.a.inst.collab.opt5=Multicultural family engagement initiatives
faq.a.inst.collab.p4=If your organization values ethical innovation in parenting support, we would love to explore possibilities.
faq.a.inst.collab.p5=Please contact us through our collaboration inquiry channel.
faq.section.unsure=Still Not Sure?
faq.q.unsure=What if I’m still not sure?
faq.a.unsure.p1=That’s okay.
faq.a.unsure.p2=You can explore GeniusParentingAI freely and decide what feels right for your family.
faq.a.unsure.p3=Parenting is deeply personal.
faq.a.unsure.p4=Support should be too.
