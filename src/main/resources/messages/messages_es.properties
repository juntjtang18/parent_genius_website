community.guidelines.title=Directrices de la comunidad - Parent Genius AI
about-caption-34=El comienzo de nuestra historia
about-caption-35=El viaje de cada padre comienza con una pregunta:
about-caption-36=“¿Estoy listo? ¿Estoy haciendo esto bien?”
about-caption-37=Descarga la App
about-caption-38=La crianza no viene con un manual
about-caption-39=Algunos son soñadores, llenos de esperanza al imaginar sostener a un niño por primera vez. Algunos son corazones expectantes, aprendiendo a navegar la alegría y los nervios del embarazo. Algunos son nuevos nidos, despiertos a las 3 AM con un bebé llorando en sus brazos. Otros son constructores de fundamentos, estableciendo límites con los niños pequeños que están probando el mundo, o guías exploradoras, ayudando a los pequeños a dar sus primeros pasos hacia la escuela y la independencia.
about-caption-40=La crianza se ve diferente para cada uno, pero un sentimiento es universal: la necesidad de apoyo, tranquilidad y orientación que realmente se adapte a tu vida.
about-caption-41new=Por eso creamos Genius Parenting AI.
about-caption-42=Ver características
about-caption-43=Por qué construimos esta aplicación
about-caption-44=Vimos una brecha. Demasiado a menudo, se le da a los padres consejos genéricos que no reflejan su cultura, personalidad o etapa de la vida. La crianza no es un tamaño único para todos.
about-caption-441=Así que preguntamos: ¿Qué pasaría si los padres tuvieran una herramienta que pudiera encontrarlos exactamente donde están?
about-caption-45=Un cuestionario que toma solo 30 segundos para entenderte.
about-caption-46=Una comunidad donde los padres se conectan, comparten y crecen juntos.
about-caption-47=Un asistente de chat de IA que nunca duerme, listo cuando nadie más puede estarlo.
about-caption-48=Consejos y cursos que se adaptan a tu personalidad, no solo a la edad de tu hijo.
about-caption-49=Construimos Genius Parenting AI para ser ese compañero. No otro manual de “cómo hacer”, sino una guía que escucha primero, luego responde de una manera que se siente personal, práctica y compasiva.
about-caption-50=Nuestra visión
about-caption-51=Empoderar a los padres con el conocimiento, las herramientas y el apoyo que necesitan para crear familias amorosas y solidarias que nutran el crecimiento, fomenten la resiliencia e inspiren a la próxima generación a prosperar con confianza, compasión y curiosidad.
about-caption-52=Nuestra misión
about-caption-53=Nuestra misión es proporcionar a los padres información práctica, consejos de expertos y recursos innovadores, ayudándoles a crear entornos de crianza donde los niños puedan crecer, prosperar y desarrollar las habilidades que necesitan para tener éxito en la vida.
about-caption-54=Nuestro logo e identidad de marca
about-caption-55=Nuestro logo es más que un diseño: es un símbolo de lo que creemos.
about-caption-56=Los colores representan diversidad, inclusividad y la calidez del amor familiar.
about-caption-57-1=La forma circular refleja el amor incondicional y el viaje interminable de la paternidad: crecimiento, conexión y nuevos comienzos.
about-caption-58=El estilo moderno y limpio muestra nuestro compromiso de mantener las cosas simples y accesibles.
about-team-title=Nuestro equipo
about-team-cap1=Dr. David Vogt
about-team-cap2=Miembro del Consejo Asesor
about-team-cap3=Profesor, Universidad de Columbia Británica
about-team-cap4=El Dr. David Vogt es profesor de la Universidad de Columbia Británica y un destacado líder en innovación.               Comenzó su carrera como astrónomo y se desempeñó como Director de los Observatorios de la UBC antes de convertirse en Director de Science World, el museo público de ciencias de Vancouver.
about-team-cap5=Con décadas de experiencia en la intersección de la ciencia, el liderazgo y la educación pública, el Dr. Vogt es ampliamente reconocido por su cuidadosa integración de tecnologías emergentes (incluida la IA) en la educación y otros campos.               Como padre de cuatro hijos, aporta experiencia profesional y conocimiento personal a su función de asesor.
about-team-cap6=Shuguo
about-team-cap7=Fundador, GeniusParentingAI
about-team-cap8=Maestría en Educación, Universidad de Columbia Británica
about-team-cap9=Shu Guo es un educador con una Maestría en Educación de la Universidad de Columbia Británica y una amplia experiencia trabajando con niños y familias.
about-team-cap10=GeniusParentingAI no nació de la idea de una paternidad perfecta, sino de una experiencia real vivida.               Como muchos padres, Shu encontró confusión, errores, dudas y momentos de incertidumbre en su propia trayectoria como madre.
about-team-cap11=A través de estos desafíos, desarrolló una creencia fundamental: el fracaso no es lo opuesto a una buena crianza; a menudo es donde comienza el aprendizaje significativo.
about-team-cap12=Esta filosofía forma la base de GeniusParentingAI: apoyo compasivo, orientación práctica y conocimiento basado en evidencia para familias reales que enfrentan desafíos reales.
about-team-cap13=James Tang
about-team-cap14=Arquitecto y desarrollador de pila completa Creador de productos de IA
about-team-cap15=Maestría en informática, Universidad Fairleigh Dickinson
about-team-cap16=James Tang es un arquitecto completo y creador de productos centrados en la IA con más de 20 años de experiencia transformando ideas complejas en sistemas de software escalables y de alto rendimiento.
about-team-cap17=Ha dirigido equipos de ingeniería para productos empresariales globales y ha creado aplicaciones web y móviles impulsadas por IA desde el concepto hasta el lanzamiento. Su experiencia abarca sistemas distribuidos, desarrollo nativo de la nube (AWS, GCP, Azure) y plataformas de datos a gran escala, incluidas contribuciones a bases de datos MPP y sistemas de respaldo empresariales utilizados en todo el mundo.
about-team-cap18=James cree que el software excepcional se basa en fundamentos sólidos, una arquitectura limpia y una ejecución disciplinada. Le apasiona igualmente asesorar equipos y fomentar la excelencia técnica.
about-believe-cap1=Nuestra creencia
about-believe-cap2=En GeniusParentingAI, nuestra creencia es simple:
about-believe-cap3=Cuando los padres reciben apoyo, no juicio, los niños prosperan.
about-believe-cap4=Cuando los niños prosperan, las familias y la sociedad se benefician.
about-believe-cap5=GeniusParentingAI existe para ayudar a los padres a desarrollar conocimientos básicos sólidos, evitar errores comunes y tomar decisiones reflexivas e informadas que respalden el bienestar a largo plazo de sus hijos.
about-believe-cap6=Al combinar experiencia educativa, innovación tecnológica y conocimientos sobre la crianza de los hijos en la vida real, nuestra plataforma tiene como objetivo beneficiar a las familias, los educadores, los profesionales y las instituciones, al mismo tiempo que apoya la investigación, la comunicación y la colaboración en toda la comunidad de bienestar infantil y familiar.
about-caption-60=Para cada padre, en cada etapa
about-caption-61=El soñador
about-caption-62=Preparándose emocional y físicamente para la paternidad.
about-caption-63=El corazón expectante
about-caption-64=Buscando tranquilidad y orientación durante el embarazo.
about-caption-65=El nuevo nido
about-caption-66=Ajustándose a las señales del bebé, noches sin dormir y el vínculo.
about-caption-67=El constructor de fundamentos
about-caption-68=Navegando los berrinches y la independencia de los niños pequeños.
about-caption-69=La guía del explorador
about-caption-70=Apoyando los primeros años escolares, la curiosidad y las habilidades sociales.
about-academic-cap1=Orientación y apoyo académico
about-academic-cap2=Extendemos nuestro más sincero agradecimiento a los profesores y estudiantes de posgrado del programa de Maestría en Tecnología Educativa de la Universidad de Columbia Británica por su continua orientación y valiosas contribuciones.
about-academic-cap3=Su experiencia y apoyo han desempeñado un papel importante a la hora de convertir a GeniusParentingAI en una plataforma más profesional, innovadora e impactante.
about-caption-71=Contáctanos
about-caption-72=¿Tienes preguntas o necesitas apoyo? Estamos aquí para ti en cada paso del camino.
