seg-parenting-top-caption-101=Por qué es importante
seg-parenting-top-caption-102=La crianza es el único trabajo sin formación formal. El acceso a recursos basados en evidencia ayuda a los padres a sentirse menos aislados y más empoderados. No se trata de 'la crianza perfecta', se trata de tener las herramientas adecuadas en el momento adecuado.
