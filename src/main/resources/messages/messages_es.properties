seg-school-top-caption-34=Vida escolar y social
seg-school-top-caption-35=Desde el primer día de guardería hasta navegar por los grupos de amigos adolescentes, la escuela y las amistades moldean el mundo de un niño. Los padres pueden ser el ancla: apoyando el aprendizaje, las habilidades sociales y la resiliencia cuando surgen desafíos.
seg-school-top-caption-37=Descarga la App
seg-school-top-caption-101=Por qué es importante
seg-school-top-caption-102=Estudios de la Universidad McGill muestran que los niños que se sienten apoyados socialmente tienen más probabilidades de tener éxito académicamente. Las relaciones entre pares y la colaboración entre padres y escuelas juegan un papel importante en la confianza, la identidad y el futuro liderazgo.
