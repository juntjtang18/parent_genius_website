seg-school-top-caption-34=学校と社会生活
seg-school-top-caption-35=デイケアの初日から思春期のグループに至るまで、学校と友情は子供の世界を形作ります。親は学び、社会的スキル、そして課題が現れたときのレジリエンスを支えるアンカーとなることができます。
seg-school-top-caption-37=アプリをダウンロード
seg-school-top-caption-101=なぜ重要なのか
seg-school-top-caption-102=マギル大学の研究によると、社会的にサポートされていると感じる子供は、学業で成功する可能性が高くなります。仲間との関係や親と学校の協力は、自信、アイデンティティ、将来のリーダーシップに大きな役割を果たします。
seg-emotion-bottom-caption-19=育児
seg-emotion-bottom-caption-20=ワンタップで
seg-emotion-bottom-caption-33=Genius Parenting AIでは、親がサポートされていると感じると、子供たちが成長すると信じています。そして、子供たちが成長すると、私たち全員の未来が明るくなります。
seg-emotion-bottom-caption-24=アプリをダウンロード！
seg-emotion-bottom-caption-25=無料で試せます。クレジットカードは不要です。
seg-parenting-bottom-caption-19=育児
seg-parenting-bottom-caption-20=ワンタップで
seg-parenting-bottom-caption-33=Genius Parenting AIをダウンロードして、育児を...軽やかに感じましょう。
seg-parenting-bottom-caption-24=アプリをダウンロード！
seg-parenting-bottom-caption-25=無料で試せます。クレジットカードは不要です。
seg-growth-top-caption-34=成長とマイルストーン
seg-growth-top-caption-35=子供の成長の各段階は新しい成長をもたらします — 初めての一歩から初めての試験まで。マイルストーンを追跡することは比較のためではなく、進歩を祝うことと、追加のサポートが必要なときに知ることです。
seg-growth-top-caption-37=アプリをダウンロード
seg-growth-top-caption-101=なぜ重要なのか
seg-growth-top-caption-102=発達心理学（ピアジェ、エリクソン）によると、各段階は独自の機会とリスクをもたらします。子供がどこにいるかを理解することで、圧力ではなく共感を持って対応できます。
seg-emotion-top-caption-34=感情的発達
seg-emotion-top-caption-35=子供を育てることはマイルストーンだけではなく、感情についてもです。子供が自分の感情を名前付け、管理し、表現する手助けをすることは、生涯にわたるレジリエンスと健康的な関係の基盤を築きます。
