faq.title=FAQ - GeniusParentingAI
faq.title=よくある質問
faq.section.about=GeniusParentingAI について
faq.q.about.created=GeniusParentingAI を作成したのは誰ですか?
faq.a.about.created.p1=GeniusParentingAI は、子供の発達、子育て教育、テクノロジー、実際の子育て経験の専門知識を組み合わせた教育者とソフトウェア専門家によって設立されました。
faq.a.about.created.p2=それは次のような単純な信念に基づいて構築されました。
faq.a.about.created.belief=特にカナダのような多文化環境では、子育てには思慮深い、判断にとらわれないサポートが必要です。
faq.a.about.created.p3=このプラットフォームは、理論だけからではなく、実際の子育ての課題と教室での実際の経験から作成されました。
faq.q.about.mission=GeniusParentingAI の使命は何ですか?
faq.a.about.mission.p1=私たちの使命は、以下の点で保護者をサポートすることです。
faq.a.about.mission.li1=冷静かつ思慮深い指導
faq.a.about.mission.li2=文化を意識した子育てに関する洞察
faq.a.about.mission.li3=倫理的でプライバシー最優先のテクノロジー
faq.a.about.mission.li4=協力的で包括的なコミュニティ
faq.a.about.mission.p2=私たちは、自信を持った子育てはプレッシャーではなく理解によって育まれると信じています。
faq.section.for=誰のためのものですか?
faq.q.for.who=GeniusParentingAI は誰のためのものですか?
faq.a.for.who.p1=GeniusParentingAI は次の目的で設計されています。
faq.a.for.who.li1=両親と介護者
faq.a.for.who.li2=期待している両親
faq.a.for.who.li3=移民と多文化家族
faq.a.for.who.li4=教育者と実践者
faq.a.for.who.li5=家族の幸福に焦点を当てた機関
faq.a.for.who.p2=ここに属するために「完璧な親」である必要はありません。
faq.a.for.who.p3=思慮深く立ち直る子どもたちを育てることに関心があるなら、あなたは正しい場所にいます。
faq.q.for.onlyParents=これはすでに子供がいる人だけが対象ですか？
faq.a.for.onlyParents.p1=全くない。
faq.a.for.onlyParents.p2=子供を産む予定または出産を計画している場合、このプラットフォームは次のことに役立ちます。
faq.a.for.onlyParents.li1=カナダでの子育ての準備をする
faq.a.for.onlyParents.li2=幼児期の発達を理解する
faq.a.for.onlyParents.li3=自分の子育ての価値観を振り返る
faq.a.for.onlyParents.li4=赤ちゃんが生まれる前に自信をつけましょう
faq.q.for.diff=💡 GeniusParentingAI は何が違うのですか?
faq.a.for.diff.p1=多くの子育てアプリでは一般的なアドバイスが提供されています。
faq.a.for.diff.p2=GeniusParentingAI は次の点で異なります。
faq.a.for.diff.li1=多文化の子育ての現実を理解する
faq.a.for.diff.li2=研究に基づいた児童発達と実際の経験を融合
faq.a.for.diff.li3=バイリンガルおよび二文化家族をサポートします
faq.a.for.diff.li4=厳格な指導ではなく反省を優先する
faq.a.for.diff.li5=プライバシー最優先で広告なしで構築されています
faq.a.for.diff.p3=私たちは、カナダの文化的ルーツと生活の間に緊張があることを認識しており、保護者がそれを慎重に乗り越えられるよう支援します。
faq.section.app=アプリでは何ができますか?
faq.q.app.do=GeniusParentingAI では何ができますか?
faq.a.app.do.p1=GeniusParentingAI 内では、以下にアクセスできます。
faq.a.app.do.li1=年齢別の子育て指導
faq.a.app.do.li2=子供の成長と発達の追跡
faq.a.app.do.li3=バイリンガルおよび二文化の子育てに関する洞察
faq.a.app.do.li4=親のための精神的健康に関する考察
faq.a.app.do.li5=年齢層別の活動と日課
faq.a.app.do.li6=都市、背景、またはトピック別のコミュニティ サークル
faq.a.app.do.li7=AI を活用した現実の子育て状況を反映するツール
faq.a.app.do.p2=それは単なるアドバイスではなく、考え、成長し、つながるためのスペースです。
faq.section.community=他の保護者とつながることはできますか?
faq.q.community.connect=他の保護者とつながることはできますか?
faq.a.community.connect.p1=はい — コミュニティは GeniusParentingAI の中心です。
faq.a.community.connect.p2=以下に基づいてサークルに参加できます。
faq.a.community.connect.li1=お子様の年齢
faq.a.community.connect.li2=あなたの文化的背景
faq.a.community.connect.li3=あなたの街
faq.a.community.connect.li4=子育てに関する共通の関心
faq.a.community.connect.p3=子育ては孤独を感じるべきではありません。
faq.section.lang=言語サポート
faq.q.lang.support=複数の言語をサポートしていますか?
faq.a.lang.support.p1=私たちは多言語サポートを段階的に構築しています。
faq.a.lang.support.p2=好みの言語を選択できます。
faq.a.lang.support.p3=私たちは子育て支援を包括的で利用しやすいものにすることを目指しています。
faq.section.privacy=プライバシーと倫理
faq.q.privacy.collect=個人情報を収集しますか?
faq.a.privacy.collect.p1=いいえ、これは私たちの中心原則の 1 つです。
faq.a.privacy.collect.li1=実名要件なし
faq.a.privacy.collect.li2=必須の確認済みメールアドレスはありません
faq.a.privacy.collect.li3=子供を特定できるデータは必要ありません
faq.a.privacy.collect.li4=設計により最小限のデータ収集
faq.a.privacy.collect.p2=GeniusParentingAI は、データを収集するためではなく、家族をサポートするために構築されています。
faq.q.privacy.anon=私の情報は匿名ですか?
faq.a.privacy.anon.p1=はい。
faq.a.privacy.anon.p2=プラットフォームはデフォルトでは匿名です。自分の身元を明らかにすることなく、自由に探索することができます。
faq.q.privacy.share=ユーザーデータを販売または共有しますか?
faq.a.privacy.share.p1=一度もない。
faq.a.privacy.share.p2=当社はユーザーデータを販売しません。
faq.a.privacy.share.p3=当社は個人データを広告主と共有しません。
faq.a.privacy.share.p4=私たちは広告のない状態を維持することに取り組んでいます。
faq.section.ai=AIはどのように使用されますか?
faq.q.ai.used=AIはどのように活用されているのでしょうか？
faq.a.ai.used.p1=GeniusParentingAI の AI は次の目的で設計されています。
faq.a.ai.used.li1=親が状況を振り返るのを助ける
faq.a.ai.used.li2=さまざまな視点を提供する
faq.a.ai.used.li3=思慮深い意思決定をサポートする
faq.a.ai.used.p2=次のようなことはありません。
faq.a.ai.used.no1=子どもを診断する
faq.a.ai.used.no2=専門家のアドバイスを置き換える
faq.a.ai.used.no3=家族のために決断を下す
faq.a.ai.used.p3=AI は考えるパートナーであり、人間のケアに代わるものではありません。
faq.q.ai.therapy=これは治療や医学的アドバイスに代わるものですか?
faq.a.ai.therapy.p1=いいえ。
faq.a.ai.therapy.p2=GeniusParentingAI は教育サポート プラットフォームであり、以下の代替プラットフォームではありません。
faq.a.ai.therapy.li1=医療
faq.a.ai.therapy.li2=メンタルヘルス治療
faq.a.ai.therapy.li3=専門的なセラピー
faq.a.ai.therapy.li4=正式な評価または診断
faq.a.ai.therapy.p3=私たちは常に、必要に応じて資格のある専門家を家族に依頼することをお勧めします。
faq.section.pricing=価格とメンバーシップ
faq.q.pricing.free=GeniusParentingAI は無料ですか?
faq.a.pricing.free.p1=はい。
faq.a.pricing.free.p2=アプリは無料でダウンロードでき、自由に探索できます。
faq.a.pricing.free.p3=コア機能 (ガイダンス、ツール、コミュニティ) には、支払いなしでアクセスできます。
faq.q.pricing.needMember=メンバーシップは必要ですか?
faq.a.pricing.needMember.p1=いいえ。
faq.a.pricing.needMember.p2=メンバーシップは任意であり、必須ではありません。
faq.q.pricing.whyPaid=なぜ有料メンバーシップを提供するのでしょうか?
faq.a.pricing.whyPaid.p1=維持するには:
faq.a.pricing.whyPaid.li1=倫理的でプライバシー最優先のテクノロジー
faq.a.pricing.whyPaid.li2=質の高い教育コンテンツ
faq.a.pricing.whyPaid.li3=プラットフォームの改善
faq.a.pricing.whyPaid.li4=広告なしのエクスペリエンス
faq.a.pricing.whyPaid.p2=私たちをサポートするかどうかは、保護者が自由に選択できます。
faq.q.pricing.cost=会員料金はいくらですか?
faq.a.pricing.cost.p1=会員価格はアプリ内に明確に表示され、Apple のアプリ内購入システムを通じて安全に処理されます。
faq.a.pricing.cost.p2=当社はお客様の支払い情報を処理または保存しません。
faq.section.institution=機関と研究の協力
faq.q.inst.collab=教育者や教育機関は GeniusParentingAI と協力できますか?
faq.a.inst.collab.p1=はい、私たちはコラボレーションを積極的に歓迎します。
faq.a.inst.collab.p2=当社は以下とのパートナーシップを歓迎します。
faq.a.inst.collab.li1=学校
faq.a.inst.collab.li2=幼児センター
faq.a.inst.collab.li3=コミュニティ組織
faq.a.inst.collab.li4=大学
faq.a.inst.collab.li5=児童発達と家族の幸福の研究者
faq.a.inst.collab.p3=考えられるコラボレーションには次のようなものがあります。
faq.a.inst.collab.opt1=親の教育プログラム
faq.a.inst.collab.opt2=研究パートナーシップ (倫理的、匿名化されたデータのみ)
faq.a.inst.collab.opt3=コミュニティ内でのパイロット プログラム
faq.a.inst.collab.opt4=機関の会員モデル
faq.a.inst.collab.opt5=多文化家族参加の取り組み
faq.a.inst.collab.p4=あなたの組織が子育て支援における倫理的革新を重視しているのであれば、私たちはぜひ可能性を探求したいと考えています。
faq.a.inst.collab.p5=コラボレーションに関するお問い合わせチャネルを通じてご連絡ください。
faq.section.unsure=まだわからないですか?
faq.q.unsure=まだわからない場合はどうすればよいですか?
faq.a.unsure.p1=大丈夫です。
faq.a.unsure.p2=GeniusParentingAI を自由に探索して、家族にとって何が適切であるかを決定することができます。
faq.a.unsure.p3=子育ては非常に個人的なものです。
faq.a.unsure.p4=サポートもそうあるべきです。
