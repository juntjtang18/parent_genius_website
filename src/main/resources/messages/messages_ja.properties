community.guidelines.title=コミュニティガイドライン - ペアレント・ジーニアスAI
about-caption-34=私たちの物語の始まり
about-caption-35=すべての親の旅は質問から始まります：
about-caption-36=「私は準備ができているのか？私はこれを正しくやっているのか？」
about-caption-37=アプリをダウンロード
about-caption-38=育児にはマニュアルがありません
about-caption-39=夢見る人もいれば、初めて子供を抱くことを想像しながら希望に満ちています。妊娠の喜びと緊張を乗り越えようとしている期待に満ちた心もいます。新しい巣を持つ人は、腕の中で泣いている赤ちゃんと共に午前3時に目を覚まします。他の人は、世界を試す幼児との境界を設定する基盤を築く人々であり、または、子供たちが学校と独立に向けて最初の一歩を踏み出すのを助ける探検ガイドです。
about-caption-40=育児は人それぞれ異なりますが、共通しているのは、実際に自分の生活に合ったサポート、安心感、指導が必要だということです。
about-caption-41new=それが、私たちが Genius Parenting AI を作成した理由です。
about-caption-42=機能を見る
about-caption-43=なぜこのアプリを作ったのか
about-caption-44=私たちはギャップを見ました。親たちは、文化、個性、または人生のステージを反映しない一般的なアドバイスを受けることがあまりにも多いのです。育児は一律ではありません。
about-caption-441=そこで私たちは尋ねました：親たちが自分のいる場所に正確に応じたツールを持っていたらどうなるでしょうか？
about-caption-45=あなたを理解するのにわずか30秒かかるクイズ。
about-caption-46=親たちがつながり、共有し、一緒に成長するコミュニティ。
about-caption-47=誰もいないときにいつでも準備ができているAIチャットアシスタント。
about-caption-48=あなたの子供の年齢だけでなく、あなたの性格に合ったヒントとコース。
about-caption-49=私たちはGenius Parenting AIをそのパートナーとして構築しました。単なる「ハウツー」マニュアルではなく、まずは聞き、次に個人的で実用的、かつ思いやりのある方法で応答するガイドです。
about-caption-50=私たちのビジョン
about-caption-51=親が愛情深く、支え合う家族を作るために必要な知識、ツール、サポートを持つことを可能にし、成長を育み、レジリエンスを促進し、次の世代が自信、思いやり、好奇心を持って繁栄できるようにすること。
about-caption-52=私たちのミッション
about-caption-53=親が実行可能な洞察、専門的なアドバイス、革新的なリソースを提供し、子供たちが成長し、繁栄し、人生で成功するために必要なスキルを身につけることができる育成環境を作る手助けをすること。
about-caption-54=私たちのロゴとブランドアイデンティティ
about-caption-55=私たちのロゴはデザイン以上のもの — 私たちが信じるものの象徴です。
about-caption-56=色は多様性、包括性、そして家族の愛の温かさを表しています。
about-caption-57-1=円形のフォルムは、無条件の愛と、成長、つながり、新たな始まりなど、子育ての終わりのない旅を反映しています。
about-caption-58=現代的でクリーンなスタイルは、シンプルで親しみやすいものを維持するという私たちのコミットメントを示しています。
about-team-title=私たちのチーム
about-team-cap1=デビッド・フォークト博士
about-team-cap2=諮問委員会メンバー
about-team-cap3=ブリティッシュコロンビア大学教授
about-team-cap4=David Vogt 博士は、ブリティッシュ コロンビア大学の教授であり、優れたイノベーションのリーダーです。               彼は天文学者としてキャリアをスタートし、UBC 天文台の所長を務めた後、バンクーバーの公立科学博物館であるサイエンス ワールドの館長になりました。
about-team-cap5=科学、リーダーシップ、公教育の交差点で数十年の経験を持つフォークト博士は、AI を含む新興テクノロジーを教育やその他の分野に思慮深く統合していることで広く知られています。               4 人の子供の父親である彼は、専門的な専門知識と個人的な洞察の両方を顧問の役割にもたらしています。
about-team-cap6=シュウ・グオ
about-team-cap7=GeniusParentingAI 創設者
about-team-cap8=ブリティッシュコロンビア大学教育修士
about-team-cap9=Shu Guo は、ブリティッシュ コロンビア大学で教育修士号を取得した教育者であり、子供たちや家族と関わった豊富な経験があります。
about-team-cap10=GeniusParentingAI は、完璧な子育てという考えから生まれたのではなく、実際の生きた経験から生まれました。               多くの親と同じように、シュウさんも子育ての過程で混乱、間違い、自信喪失、不安な瞬間に遭遇しました。
about-team-cap11=これらの課題を通じて、彼女は核となる信念を育みました。「失敗は良い子育ての反対ではなく、多くの場合、失敗から有意義な学びが始まるのです。」
about-team-cap12=この哲学は、現実の課題に直面している実際の家族に対する思いやりのあるサポート、実践的な指導、証拠に基づいた洞察という GeniusParentingAI の基盤を形作ります。
about-team-cap13=ジェームス・タン
about-team-cap14=フルスタック アーキテクトおよびAI プロダクトビルダー
about-team-cap15=フェアリー・ディキンソン大学、CS修士号
about-team-cap16=James Tang は、フルスタック アーキテクトであり、AI に重点を置いた製品ビルダーであり、複雑なアイデアをスケーラブルで高性能なソフトウェア システムに変換する 20 年以上の経験があります。
about-team-cap17=彼は、グローバル エンタープライズ製品のエンジニアリング チームを率い、コンセプトから立ち上げまで AI を活用したモバイルおよび Web アプリケーションを構築してきました。彼の専門知識は分散システム、クラウドネイティブ開発 (AWS、GCP、Azure)、および世界中で使用されている MPP データベースやエンタープライズ バックアップ システムへの貢献を含む大規模データ プラットフォームに及びます。
about-team-cap18=James は、優れたソフトウェアは強力な基礎、クリーンなアーキテクチャ、規律ある実行に基づいて構築されると信じています。彼はチームの指導と技術的卓越性の育成にも同様に情熱を持っています。
about-believe-cap1=私たちの信念
about-believe-cap2=GeniusParentingAI の信念はシンプルです。
about-believe-cap3=親が批判されずにサポートされると、子どもは成長します。
about-believe-cap4=子どもたちが成長すると、家族と社会に利益がもたらされます。
about-believe-cap5=GeniusParentingAI は、親が強力な基礎知識を構築し、よくある落とし穴を回避し、子供の長期的な幸福をサポートする思慮深い情報に基づいた決定を下せるよう支援するために存在します。
about-believe-cap6=私たちのプラットフォームは、教育の専門知識、技術革新、実際の子育てに関する洞察を組み合わせることで、家族、教育者、実践者、教育機関に利益をもたらすことを目的としていると同時に、より広範な子どもと家族の福祉コミュニティ全体にわたる研究、コミュニケーション、コラボレーションをサポートしています。
about-caption-60=すべての親に、すべての段階で
about-caption-61=夢見る人
about-caption-62=親になるための感情的および身体的な準備。
about-caption-63=期待する心
about-caption-64=妊娠中の安心感とガイダンスを求めて。
about-caption-65=新しい巣
about-caption-66=赤ちゃんのサイン、眠れない夜、そして絆に慣れる。
about-caption-67=基盤を築く人
about-caption-68=癇癪や幼児の独立を乗り越える。
about-caption-69=探検者のガイド
about-caption-70=初期の学校生活、好奇心、社会的スキルをサポートする。
about-academic-cap1=学術指導とサポート
about-academic-cap2=継続的なご指導と貴重な貢献をしていただいたブリティッシュ コロンビア大学教育工学修士プログラムの教師および大学院生に心より感謝いたします。
about-academic-cap3=彼らの専門知識とサポートは、GeniusParentingAI をより専門的で革新的で影響力のあるプラットフォームに形成する上で重要な役割を果たしました。
about-caption-71=お問い合わせ
about-caption-72=質問がある場合やサポートが必要な場合は、私たちがあなたのすべてのステップをサポートします。
