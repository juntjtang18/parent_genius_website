home.explore.title_en=ජෙන්පැරන්ටින් AI සමඟ ඔබට කළ හැකි දේ සොයා බලන්න
home.explore.tile1.title_en=ඔබ සමඟ වර්ධනය වන කුඩා පාඨමාලා
home.explore.tile1.text_en=කෙටි, විද්‍යාමය පදනම් වූ වර්ධන මාර්ගෝපදේශ.
home.explore.tile2.title_en=අභිරුචි AI දැනුම්දීම ලබා ගන්න
home.explore.tile2.text_en=ඔබේ දරුවාට ගැලපෙන මාර්ගෝපදේශ.
