home.explore.tile3.text_en=අද වැදගත් කුඩා කියවීම්.
home.explore.tile4.title_en=මානසික අවබෝධය ගොඩනැගීම
home.explore.tile4.text_en=සමාජ-මානසික කුසලතා එකට වර්ධනය කරන්න.
home.explore.tile5.title_en=බහු සංස්කෘතික, ඇතුළුවන දෙමාපියන්ගේ සමාජයෙහි එකතු වන්න
