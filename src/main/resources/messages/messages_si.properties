faq.a.for.who.li5=පවුලේ යහපැවැත්ම කෙරෙහි ආයතන අවධානය යොමු කළේය
faq.a.for.who.p2=ඔබ මෙහි අයත් වීමට “පරිපූර්ණ දෙමාපියෙකු” වීමට අවශ්‍ය නැත.
faq.a.for.who.p3=කල්පනාකාරී, ඔරොත්තු දෙන දරුවන් ඇති දැඩි කිරීම ගැන ඔබ සැලකිලිමත් වන්නේ නම් - ඔබ නිවැරදි ස්ථානයේ සිටී.
faq.q.for.onlyParents=මෙය දැනටමත් දරුවන් සිටින අයට පමණක්ද?
faq.a.for.onlyParents.p1=කොහෙත්ම නැහැ.
