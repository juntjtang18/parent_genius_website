faq.a.for.diff.li3=ද්විභාෂා සහ ද්වි සංස්කෘතික පවුල් සඳහා සහාය වේ
faq.a.for.diff.li4=දැඩි උපදෙස් වෙනුවට පරාවර්තනයට ප්‍රමුඛත්වය දෙයි
faq.a.for.diff.li5=පුද්ගලිකත්වය-පළමුව සහ දැන්වීම්-රහිතව ගොඩනගා ඇත
faq.a.for.diff.p3=කැනඩාවේ සංස්කෘතික මූලයන් සහ ජීවිතය අතර ආතතිය අපි හඳුනා ගනිමු - අපි එය කල්පනාකාරීව සැරිසැරීමට දෙමාපියන්ට උදව් කරමු.
