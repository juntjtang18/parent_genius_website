membership.benefits.item3=ගැඹුරු සම්බන්ධතා සඳහා ආරාධනා-පමණක් දෙමාපියන්ගේ වටය
membership.benefits.item4=නව මෙවලම් සහ විශේෂාංග සඳහා ප්‍රථම ප්‍රවේශය
