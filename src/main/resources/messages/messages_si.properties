faq.q.inst.collab=අධ්‍යාපනඥයින් හෝ ආයතන GeniusParentingAI සමඟ සහයෝගයෙන් කටයුතු කළ හැකිද?
faq.a.inst.collab.p1=ඔව් - සහ අපි සහයෝගීතාව සක්‍රියව සාදරයෙන් පිළිගනිමු.
faq.a.inst.collab.p2=අපි හවුල්කාරිත්වයන් සඳහා විවෘතව සිටිමු:
faq.a.inst.collab.li1=පාසල්
faq.a.inst.collab.li2=මුල් ළමාවිය මධ්යස්ථාන
