membership.who.title=සාමාජිකත්වය කාටද?
membership.who.card1.title=පියාපත්
membership.who.card1.text=අපගේ මූලික පාඨමාලා අවසන් කර ඇති දෙමාපියන් සහ වැඩි ගැඹුරක් අවශ්‍යයි.
membership.who.card2.title=පවුල්
membership.who.card2.text=ප්‍රායෝගික යෝජනා සොයා ගන්නා සංකීර්ණ දිනපතා අභියෝග වලට මුහුණ දෙන පවුල්.
membership.who.card3.title=කාරකයින්
membership.who.card3.text=අඛණ්ඩ වර්ධනයේ විශ්වාස කරන සහ සමාන සිතන දෙමාපියන් සමඟ සම්බන්ධ වීමට කැමති කාරකයින්.
membership.who.foot=සාමාජිකත්වය ඔබේ දෙමාපියන්ගේ “උසස් මට්ටම” ලෙස සිතන්න — ඔබ අද මුහුණ දෙන යථාර්ථයන් සඳහා අභිරුචි කරන ලද.
membership.how.title=එය කෙසේ ක්‍රියා කරයි
membership.how.step1=30-තත්පර පුද්ගලත්ව පරීක්ෂණය ගන්න — ඔබේ දෙමාපියන්ගේ ශෛලිය සොයා ගන්න.
membership.how.step2=ඔබේ මූලික පාඨමාලා මාර්ගය සොයා බලන්න.
membership.how.step3=සාමාජිකත්වයට යාවත්කාලීන කර උසස් පාඨමාලා + ප්‍රතිලාභ unlock කරන්න.
membership.how.cta=පෞරුෂය පරීක්ෂණය ආරම්භ කරන්න
membership.results.title_en=මාතාපිතාගේ හඬ
membership-caption-262=“ආධුනික පාඨමාලා මට වහාම භාවිතා කළ හැකි ප්‍රායෝගික යෝජනා ලබා දුන්නා — මෙම යෙදුම මට සමඟ වර්ධනය වන බවක් පෙනේ.”
membership-caption-263=දරුවෙකුගේ දෙමාපිය
membership-caption-264=“මාතාපිතා වටපිටා අතිශය හොඳයි. මට විනිසුරුකාරකම් නැතිව මගේ අභියෝග තේරුම් ගන්නා පුද්ගලයන් සොයා ගන්න ලැබුණා.”
membership-caption-265=පළමු වතාවට දෙමාපිය
membership-caption-266="ප්‍රායෝගික, විශ්වාසදායක, සහ වේගවත්. පරීක්ෂා ලැයිස්තු රන්මැදුරක්."
membership-caption-267=මේයි, පළමු වරට මවක්
membership-caption-19=දරුවෙකු වර්ධනය කිරීම සඳහා ගම්මානයක් අවශ්‍යයි - සහ අපි ඔබට එකක් ගොඩනැගීම්.
membership-caption-21=සමාජයට එකතු වන්න සහ ඔබේ අදහස් සහ ගැටළු බෙදා ගන්න.
membership-caption-24=ජීනියස් පියාපත් AI බාගන්න සහ පියාපත් කිරීමේ හැඟීම… ලේසියෙන් කරන්න.
membership-caption-24=අයදුම්පත බාගන්න!
membership-caption-25=පරීක්ෂා කිරීමට නොමිලේ. ණය කාඩ්පතක් අවශ්‍ය නැත.
new-course.cap1=නව පාඨමාලාවක් සාදන්න
new-course.cap2=පාඨමාලා මාතෘකාව
new-course.cap3=ඔබේ නව පාඨමාලාව සඳහා මාතෘකාව ඇතුළත් කරන්න. නිර්මාණය කිරීමෙන් පසු අන්තර්ගතය එකතු කළ හැක.
new-course.cap4=අයිකන් රූපය (විකල්ප)
new-course.cap5=පාඨමාලා අයිකනය සඳහා රූපයක් උඩුගත කරන්න (උදා: PNG, JPEG).
new-course.cap5=සුරකින්න සහ සංස්කරණය කිරීමට දිගු කරන්න
new-course.cap6=අවලංගු කරන්න
joinus.title=අප හා එකතු වන්න - Parent Genius AI
joinus.title1=අප හා එකතු වන්න!
joinus.description=Parent Genius AI හි, අපි දෙමාපියන්ගේ සහයෝගය සඳහා අනාගතය සාදමින් සිටිමු.              අපි නවෝත්පාදනය, පැහැදිලිත්වය, සහ සහයෝගය වටිනාකමක් ලෙස ගනිමු.              අපගේ කණ්ඩායමට එකතු වන්න සහ ලෝකය පුරා පවුල් සඳහා ප්‍රබල අනාගතයක් හැඩගැසීමට උදව් කරන්න!
joinus.uiux.title=UI/UX නිර්මාපක
joinus.uiux.description1=අපි අපගේ වේදිකාව සඳහා අත්හදා බැලීමේ සහ දෘශ්‍යමය ආකර්ෂණීය පරිශීලක අත්දැකීම් නිර්මාණය කළ හැකි නිර්මාපකයෙකු සොයමින් සිටිමු.
joinus.uiux.description2=කාර්යභාර:
joinus.uiux.responsibility1=ජාල සහ ජංගම යෙදුම් සඳහා පරිශීලක-හිතකාමී අතුරුමුහුණත් නිර්මාණය සහ ආකෘතිකරණය කරන්න.
joinus.uiux.responsibility2=සමීප පරිශීලක අත්දැකීමක් සහතික කිරීමට සංවර්ධකයින් සහ කොටස්කරුවන් සමඟ සහයෝගය කරන්න.
joinus.uiux.responsibility3=නිෂ්පාදන නිර්මාණය වැඩිදියුණු කිරීමට පරිශීලක පර්යේෂණ සහ භාවිතා කළ හැකි පරීක්ෂණ සිදු කරන්න.
joinus.uiux.requirements=අවශ්‍යතා:
joinus.uiux.requirement1=UI/UX නිර්මාණයේ වසර 2+ ක අත්දැකීම.
joinus.uiux.requirement2=Figma, Adobe XD, හෝ සමාන මෙවලම් වල ප්‍රවීණත්වය.
joinus.uiux.requirement3=පරිශීලක-මධ්‍යස්ථ නිර්මාණ සංකල්ප පිළිබඳ අවබෝධය.
joinus.education.title=දරුවන්ගේ අධ්‍යාපන විශේෂඥ
joinus.education.description1=අපි සාක්ෂි මත පදනම් වූ දෙමාපියන්ගේ අන්තර්ගතය සංවර්ධනය කිරීමට උදව් කිරීමට උනන්දුවක් ඇති දරුවන්ගේ අධ්‍යාපන විශේෂඥයෙකු සොයමින් සිටිමු.
joinus.education.description2=කාර්යභාර:
joinus.education.responsibility1=ආකර්ෂණීය, පර්යේෂණය මත පදනම් වූ දෙමාපියන්ගේ සම්පත් නිර්මාණය කරන්න.
