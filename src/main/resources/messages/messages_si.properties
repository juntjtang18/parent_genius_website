faq.a.about.mission.p1=අපගේ මෙහෙවර වන්නේ දෙමාපියන්ට උපකාර කිරීමයි:
faq.a.about.mission.li1=සන්සුන්, පරාවර්තක මග පෙන්වීම
faq.a.about.mission.li2=සංස්කෘතික වශයෙන් දැනුවත් මාපිය තීක්ෂ්ණ බුද්ධිය
faq.a.about.mission.li3=සදාචාරාත්මක, පෞද්ගලිකත්වය-පළමු තාක්ෂණය
faq.a.about.mission.li4=සහයෝගය දක්වන, ඇතුළත් ප්‍රජාවක්
faq.a.about.mission.p2=අපි විශ්වාස කරන්නේ දෙමාපියන් අවබෝධයෙන් වර්ධනය වන බවයි - පීඩනය නොවේ.
