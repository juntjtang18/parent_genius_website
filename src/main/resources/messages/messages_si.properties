about-team-cap3=මහාචාර්ය, බ්‍රිතාන්‍ය කොලොම්බියා විශ්ව විද්‍යාලය
about-team-cap4=ආචාර්ය ඩේවිඩ් වොග්ට් බ්‍රිතාන්‍ය කොලොම්බියා විශ්ව විද්‍යාලයේ මහාචාර්යවරයෙක් සහ දක්ෂ නවෝත්පාදන නායකයෙක්.               ඔහු තාරකා විද්‍යාඥයෙකු ලෙස සිය වෘත්තීය ජීවිතය ආරම්භ කළ අතර වැන්කුවර් හි මහජන විද්‍යා කෞතුකාගාරය වන සයන්ස් වර්ල්ඩ් හි අධ්‍යක්ෂ වීමට පෙර යූබීසී නිරීක්ෂණාගාරවල අධ්‍යක්ෂ ලෙස සේවය කළේය.
about-team-cap5=විද්‍යාව, නායකත්වය සහ පොදු අධ්‍යාපනය යන ඡේදනයන්හි දශක ගනනාවක පළපුරුද්දක් ඇති ආචාර්ය වොග්ට් අධ්‍යාපනය සහ අනෙකුත් ක්ෂේත්‍ර තුළට - AI ඇතුළු - නැගී එන තාක්ෂණයන් කල්පනාකාරී ලෙස ඒකාබද්ධ කිරීම සඳහා පුළුල් ලෙස පිළිගැනේ.               සිව්දරු පියෙකු ලෙස, ඔහු තම උපදේශක භූමිකාවට වෘත්තීය විශේෂඥතාව සහ පෞද්ගලික අවබෝධය යන දෙකම ගෙන එයි.
about-team-cap6=ෂු ගුඕ
about-team-cap7=නිර්මාතෘ, GeniusParentingAI
about-team-cap8=අධ්‍යාපන මාස්ටර්, බ්‍රිතාන්‍ය කොලොම්බියා විශ්ව විද්‍යාලය
about-team-cap9=Shu Guo යනු බ්‍රිතාන්‍ය කොලොම්බියා විශ්ව විද්‍යාලයේ අධ්‍යාපන ශාස්ත්‍රපති උපාධියක් ඇති අධ්‍යාපනඥයෙක් සහ දරුවන් සහ පවුල් සමඟ වැඩ කිරීමේ පුළුල් පළපුරුද්දකි.
about-team-cap10=GeniusParentingAI උපත ලැබුවේ පරිපූර්ණ මාපිය සංකල්පයෙන් නොවේ - නමුත් සැබෑ, සජීවී අත්දැකීම් වලින්.               බොහෝ දෙමව්පියන් මෙන්, ෂු ඇගේම මාපිය ගමනේදී ව්‍යාකූලත්වය, වැරදි, ස්වයං සැකය සහ අවිනිශ්චිත අවස්ථාවන්ට මුහුණ දුන්නාය.
about-team-cap11=මෙම අභියෝග හරහා ඇය මූලික විශ්වාසයක් ගොඩනඟා ගත්තාය: අසාර්ථක වීම හොඳ මාපියත්වයේ ප්‍රතිවිරුද්ධ දෙය නොවේ - බොහෝ විට අර්ථවත් ඉගෙනීම ආරම්භ වන්නේ එයයි.
about-team-cap12=මෙම දර්ශනය GeniusParentingAI හි පදනම හැඩගස්වයි: සැබෑ අභියෝගවලට මුහුණ දෙන සැබෑ පවුල් සඳහා සානුකම්පිත සහාය, ප්‍රායෝගික මග පෙන්වීම සහ සාක්ෂි-දැනුවත් තීක්ෂ්ණ බුද්ධිය.
about-team-cap13=ජේම්ස් ටැන්ග්
about-team-cap14=Full-Stack Architect &amp; AI නිෂ්පාදන සාදන්නා
about-team-cap15=CS හි මාස්ටර්, ෆෙයාර්ලි ඩිකින්සන් විශ්ව විද්‍යාලය
about-team-cap16=ජේම්ස් ටැන්ග් යනු සංකීර්ණ අදහස් පරිමාණය කළ හැකි, ඉහළ කාර්යසාධනයක් සහිත මෘදුකාංග පද්ධති බවට පරිවර්තනය කිරීමේ වසර 20කට වැඩි පළපුරුද්දක් ඇති පූර්ණ-ස්ටැක් ගෘහ නිර්මාණ ශිල්පියෙක් සහ AI-නාභිගත නිෂ්පාදන සාදන්නෙක් වේ.
about-team-cap17=ඔහු ගෝලීය ව්‍යවසාය නිෂ්පාදන සඳහා ඉංජිනේරු කණ්ඩායම් මෙහෙයවා ඇති අතර සංකල්පයේ සිට දියත් කිරීම දක්වා AI බලයෙන් ක්‍රියාත්මක වන ජංගම සහ වෙබ් යෙදුම් ගොඩනඟා ඇත. ලොව පුරා භාවිතා වන MPP දත්ත සමුදායන් සහ ව්‍යවසාය උපස්ථ පද්ධති සඳහා වන දායකත්වය ඇතුළුව බෙදා හරින ලද පද්ධති, cloud-native Development (AWS, GCP, Azure) සහ මහා පරිමාණ දත්ත වේදිකා වෙත ඔහුගේ ප්‍රවීණත්වය විහිදේ.
about-team-cap18=සුවිශේෂී මෘදුකාංග ශක්තිමත් මූලධර්ම, පිරිසිදු ගෘහ නිර්මාණ ශිල්පය සහ විනයානුකූලව ක්‍රියාත්මක කිරීම මත ගොඩනගා ඇති බව ජේම්ස් විශ්වාස කරයි. ඔහු කණ්ඩායම් උපදේශකත්වය සහ තාක්ෂණික විශිෂ්ටත්වය පෝෂණය කිරීම සම්බන්ධයෙන් එකසේම දැඩි උනන්දුවක් දක්වයි.
