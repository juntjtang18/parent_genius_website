about-caption-55=අපේ ලාංඡනය නිර්මාණයකට වඩා වැඩි ය - එය අපි විශ්වාස කරන දේවල සංකේතයක්.
about-caption-56=වර්ණ විවිධත්වය, ඇතුළුවීම, සහ පවුලේ ආදරයේ උණුසුම් බව නියෝජනය කරයි.
about-caption-57-1=චක්රලේඛ ආකෘතිය කොන්දේසි විරහිත ආදරය සහ දෙමාපියන්ගේ නොනවතින ගමන - වර්ධනය, සම්බන්ධතාවය සහ නව ආරම්භයන් පිළිබිඹු කරයි.
about-caption-58=නවීන, පිරිසිදු ශෛලිය අපේ සරල සහ ප්‍රවේශමත් කරුණු රැක ගැනීමට කැපවීම පෙන්වයි.
