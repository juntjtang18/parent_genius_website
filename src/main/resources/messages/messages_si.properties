faq.a.ai.used.no2=වෘත්තීය උපදෙස් ආදේශ කරන්න
faq.a.ai.used.no3=පවුල් සඳහා තීරණ ගන්න
faq.a.ai.used.p3=AI යනු චින්තන සහකරුවෙකි - මිනිස් රැකවරණය සඳහා ආදේශකයක් නොවේ.
faq.q.ai.therapy=මෙය චිකිත්සාව හෝ වෛද්‍ය උපදෙස් සඳහා ආදේශකයක්ද?
faq.a.ai.therapy.p1=නැත.
faq.a.ai.therapy.p2=GeniusParentingAI යනු අධ්‍යාපනික ආධාරක වේදිකාවක් මිස ආදේශකයක් නොවේ:
faq.a.ai.therapy.li1=වෛද්ය රැකවරණය
faq.a.ai.therapy.li2=මානසික සෞඛ්ය ප්රතිකාර
faq.a.ai.therapy.li3=වෘත්තීය චිකිත්සාව
faq.a.ai.therapy.li4=විධිමත් තක්සේරුව හෝ රෝග විනිශ්චය
faq.a.ai.therapy.p3=අවශ්‍ය වූ විට සුදුසුකම් ලත් වෘත්තිකයන් සොයා ගැනීමට අපි සෑම විටම පවුල් දිරිමත් කරමු.
faq.section.pricing=මිලකරණය සහ සාමාජිකත්වය
faq.q.pricing.free=GeniusParentingAI නොමිලේද?
faq.a.pricing.free.p1=ඔව්.
faq.a.pricing.free.p2=යෙදුම බාගත කිරීමට නොමිලේ සහ ගවේෂණය කිරීමට නොමිලේ.
faq.a.pricing.free.p3=මූලික විශේෂාංග - මග පෙන්වීම, මෙවලම් සහ ප්‍රජාව - ගෙවීමකින් තොරව ප්‍රවේශ විය හැකිය.
faq.q.pricing.needMember=මට සාමාජිකත්වයක් අවශ්‍යද?
faq.a.pricing.needMember.p1=නැත.
faq.a.pricing.needMember.p2=සාමාජිකත්වය වෛකල්පිත වන අතර කිසි විටෙකත් අවශ්‍ය නොවේ.
faq.q.pricing.whyPaid=ගෙවන සාමාජිකත්වයක් ලබා දෙන්නේ ඇයි?
faq.a.pricing.whyPaid.p1=පවත්වා ගැනීමට:
faq.a.pricing.whyPaid.li1=සදාචාරාත්මක, පෞද්ගලිකත්වය-පළමු තාක්ෂණය
faq.a.pricing.whyPaid.li2=උසස් තත්ත්වයේ අධ්‍යාපනික අන්තර්ගතය
faq.a.pricing.whyPaid.li3=වේදිකා වැඩිදියුණු කිරීම්
faq.a.pricing.whyPaid.li4=දැන්වීම්-රහිත අත්දැකීමක්
faq.a.pricing.whyPaid.p2=දෙමව්පියන් අපට සහාය දෙනවාද නැද්ද යන්න නිදහසේ තෝරා ගනී.
faq.q.pricing.cost=සාමාජිකත්වය සඳහා කොපමණ මුදලක් වැය වේද?
faq.a.pricing.cost.p1=සාමාජිකත්ව මිලකරණය යෙදුම තුළ පැහැදිලිව දර්ශනය වන අතර Apple හි යෙදුම තුළ මිලදී ගැනීමේ පද්ධතිය හරහා ආරක්ෂිතව හසුරුවනු ලැබේ.
faq.a.pricing.cost.p2=අපි ඔබේ ගෙවීම් තොරතුරු සැකසීම හෝ ගබඩා කරන්නේ නැහැ.
