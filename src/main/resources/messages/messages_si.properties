faq.a.app.do.li6=නගරය, පසුබිම හෝ මාතෘකාව අනුව ප්‍රජා කව
faq.a.app.do.li7=සැබෑ ජීවිතයේ මාපිය තත්වයන් සඳහා AI-සහාය දක්වන පරාවර්තන මෙවලම්
faq.a.app.do.p2=එය උපදෙස් පමණක් නොවේ - එය සිතීමට, වර්ධනය වීමට සහ සම්බන්ධ වීමට අවකාශයකි.
faq.section.community=මට වෙනත් දෙමාපියන් සමඟ සම්බන්ධ විය හැකිද?
faq.q.community.connect=මට වෙනත් දෙමාපියන් සමඟ සම්බන්ධ විය හැකිද?
faq.a.community.connect.p1=ඔව් - ප්‍රජාව GeniusParentingAI සඳහා කේන්ද්‍රීය වේ.
faq.a.community.connect.p2=ඔබට මේවා මත පදනම්ව කව හා සම්බන්ධ විය හැක:
faq.a.community.connect.li1=ඔබේ දරුවාගේ වයස
faq.a.community.connect.li2=ඔබේ සංස්කෘතික පසුබිම
faq.a.community.connect.li3=ඔබේ නගරය
faq.a.community.connect.li4=බෙදාගත් මාපිය අවශ්‍යතා
faq.a.community.connect.p3=දෙමව්පියන්ට හුදකලා බවක් දැනිය යුතු නැත.
faq.section.lang=භාෂා සහාය
faq.q.lang.support=ඔබ බහු භාෂා සඳහා සහය දක්වනවාද?
faq.a.lang.support.p1=අපි බහුභාෂා සහයෝගය ක්‍රමානුකූලව ගොඩනගමින් සිටිමු.
faq.a.lang.support.p2=ඔබට කැමති භාෂාව තෝරාගත හැක.
faq.a.lang.support.p3=අපි දෙමාපිය සහාය ඇතුළත් සහ ප්‍රවේශ විය හැකි බවට පත් කිරීමට ඉලක්ක කරමු.
faq.section.privacy=පෞද්ගලිකත්වය සහ ආචාර ධර්ම
faq.q.privacy.collect=ඔබ පුද්ගලික තොරතුරු රැස් කරනවාද?
faq.a.privacy.collect.p1=නැත - මෙය අපගේ මූලික මූලධර්මවලින් එකකි.
faq.a.privacy.collect.li1=සැබෑ නම අවශ්‍ය නොවේ
faq.a.privacy.collect.li2=අනිවාර්ය සත්‍යාපිත විද්‍යුත් තැපෑලක් නැත
faq.a.privacy.collect.li3=ළමයින් හඳුනාගත හැකි දත්ත අවශ්‍ය නොවේ
faq.a.privacy.collect.li4=සැලසුම් අනුව අවම දත්ත එකතු කිරීම
faq.a.privacy.collect.p2=GeniusParentingAI ගොඩනඟා ඇත්තේ පවුල්වලට උපකාර කිරීම සඳහා - දත්ත අස්වැන්න සඳහා නොවේ.
faq.q.privacy.anon=මගේ තොරතුරු නිර්නාමිකද?
faq.a.privacy.anon.p1=ඔව්.
faq.a.privacy.anon.p2=වේදිකාව පෙරනිමියෙන් නිර්නාමික වේ. ඔබේ අනන්‍යතාවය හෙළි නොකර ඔබට නිදහසේ ගවේෂණය කළ හැක.
faq.q.privacy.share=ඔබ පරිශීලක දත්ත විකුණන්නේ හෝ බෙදා ගන්නේද?
faq.a.privacy.share.p1=කවදාවත් නැහැ.
faq.a.privacy.share.p2=අපි පරිශීලක දත්ත විකුණන්නේ නැහැ.
faq.a.privacy.share.p3=අපි පුද්ගලික දත්ත දැන්වීම්කරුවන් සමඟ බෙදා නොගනිමු.
faq.a.privacy.share.p4=අපි දැන්වීම්-රහිතව සිටීමට කැපවී සිටිමු.
faq.section.ai=AI භාවිතා කරන්නේ කෙසේද?
faq.q.ai.used=AI භාවිතා කරන්නේ කෙසේද?
faq.a.ai.used.p1=GeniusParentingAI හි AI නිර්මාණය කර ඇත්තේ:
faq.a.ai.used.li1=තත්වයන් ගැන මෙනෙහි කිරීමට දෙමාපියන්ට උපකාර කරන්න
faq.a.ai.used.li2=විවිධ දෘෂ්ටිකෝණ ඉදිරිපත් කරන්න
faq.a.ai.used.li3=කල්පනාකාරී තීරණ ගැනීමට සහාය වන්න
faq.a.ai.used.p2=එය එසේ නොවේ:
