home.title_en=Genius Parenting AI
home.hero.title_en1=Genius Parenting AI
home.hero.subtitle_en1=සන්සුන්, කල්පනාකාරී දෙමාපිය සහාය - අධ්‍යාපනඥයින් විසින් ගොඩනගා ඇති, ප්‍රවේශමෙන් නිර්මාණය කර ඇත.
home.hero.subtitle_en2=GeniusParentingAI යනු වගකීම් සහිත AI භාවිතයෙන් එදිනෙදා මාපිය ප්‍රශ්න ගැන සිතීමට දෙමාපියන්ට උපකාර කරන නිදහස්, පෞද්ගලිකත්වය-පළමු මාපිය අධ්‍යාපන වේදිකාවකි. දත්ත විකිණීමක් නැත. පෙරනිමියෙන් නිර්නාමික.
home.hero.cta_en=අයදුම්පත බාගන්න
home.why.title_en=ජෙන්පැරන්ටින් AI ඇයි?
home.why.card1.title_en=අභිරුචි පියාපත් සහයෝගය:
home.why.card1.text_en=ඔබේ දරුවාගේ වයස, අවශ්‍යතා සහ වර්ධන වේගයට අනුව දෛනික දැනුම්දීම ලබා ගන්න - විශේෂඥයන්ගේ සහයෝගයෙන්.
home.why.learn_en=වැඩිදුර ඉගෙන ගන්න →
home.why.card2.title_en=නිර්මාණශීලීත්වය සහ ඉගෙනීම, එකම මධ්‍යස්ථානයක
home.why.card2.text_en=මානසික සහ සංවේදී වර්ධනයක් ඇති කලාවන්, කතා, සහ ක්‍රීඩා අහඹු කරන්න.
home.why.learn_en=වැඩිදුර ඉගෙන ගන්න →
home.why.card3.title_en=සමාජය සහ විශේෂඥ ප්‍රවේශය
home.why.card3.text_en=සත්‍ය මාපියන් සහ පරීක්ෂා කරන විශේෂඥයන් සමඟ ඉගෙන ගන්න, ඔබට අවශ්‍ය ඕනෑම වේලාවක.
home.why.learn_en=වැඩිදුර ඉගෙන ගන්න →
home.results.title_en=සත්‍ය දෙමාපියන්. සත්‍ය ප්‍රතිඵල.
home.results.quote1_en="ජීනියස් පියාපත් AI මගේ ආකාරය වෙනස් කළා — එය අර්ථවත් සහයෝගයක්, නිර්මාණශීලී ආරම්භයක්, එකම අයදුම්පතකින්."
home.results.author1_en=සාරා, දරුවන් දෙදෙනෙකුගේ මව
home.results.quote2_en="මට මයිල්ස්ටෝන් ට්‍රැකර් එක අමතකයි! එය මට සාමකාමීව සිටීමට සහ මගේ දියණියගේ ප්‍රගතිය පහසුවෙන් අනුගමනය කිරීමට උපකාරී වේ."
home.results.author2_en=ඩේවිඩ්, වයස අවුරුදු 5ක දියණියක පියා
home.results.quote3_en="මගේ දරුවාගේ සමාජ කුසලතා පිළිබඳව මට විශ්වාසයක් ඇති බව මට හැඟේ මයින්ඩ්බ්‍රිජ් විශේෂාංගය නිසා. එය පුහුණුකරුක් වැනි දෙයක්!"
home.results.author3_en=ජේම්ස්, වයස 7ක් ඇති දරුවෙකුගේ පියා
